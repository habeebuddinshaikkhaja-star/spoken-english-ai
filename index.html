<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My English Teacher AI</title>
<style>
body { font-family: Arial; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; padding: 20px; }
button { padding: 12px 20px; margin: 5px; border: none; border-radius: 20px; background: #4CAF50; color: white; cursor: pointer; font-size: 16px; }
button:hover { background: #45a049; }
#result { background: rgba(255,255,255,0.2); padding: 20px; border-radius: 10px; margin: 20px; font-size: 18px; }
.orange { background: #ff5722!important; }
</style>
</head>
<body>

<h1>🤖 My English Teacher AI</h1>
<p>Tumhari Personal English Teacher</p>

<button onclick="selectLesson('atoz')">1. A to Z</button>
<button onclick="selectLesson('questions')">2. Questions</button>
<button onclick="selectLesson('grammar')">3. Grammar</button>
<button onclick="selectLesson('leave')">4. Leave Letter</button>

<div id="result">Menu se koi lesson chuno 👇</div>
<div id="progress"></div>

<button class="orange" onclick="speak(lessons[currentLesson][currentIndex])">🔊 Speak Now</button>
<button class="orange" onclick="nextSentence()">🔁 Repeat</button>

<script>
let currentLesson = "";
let currentIndex = 0;

const lessons = {
atoz: ["A for Apple", "B for Ball", "C for Cat", "D for Dog", "E for Elephant"],
questions: ["What is your name?", "Where do you live?", "How are you?", "What do you do?", "Are you busy?"],
grammar: ["She don't like apples", "I am go to market", "He have two car", "They is playing cricket", "We was late yesterday"],
leave: ["I am sick today", "Please grant me leave", "I have fever", "I will come tomorrow", "Thank you sir"]
};

function selectLesson(lesson) {
  currentLesson = lesson;
  currentIndex = 0;
  document.getElementById("progress").innerText = `Sentence ${currentIndex + 1} of 5`;
  document.getElementById("result").innerText = lessons[lesson][currentIndex];
  speak(lessons[lesson][currentIndex]);
}

function nextSentence() {
  currentIndex++;
  if(currentIndex >= 5) currentIndex = 0;
  document.getElementById("progress").innerText = `Sentence ${currentIndex + 1} of 5`;
  document.getElementById("result").innerText = lessons[currentLesson][currentIndex];
  speak(lessons[currentLesson][currentIndex]);
}

function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = 'en-US';
  speech.rate = 0.8;
  window.speechSynthesis.speak(speech);
 }
 
 function selectLesson(lesson) {
 currentLesson = lesson;
 currentIndex = 0;
 document.getElementById("progress").innerText = `Sentence ${currentIndex + 1} of 5`;
 document.getElementById("result").innerText = lessons[lesson][currentIndex];
 speak(lessons[lesson][currentIndex]);
 }
 
 const lessons = {
 atoz: ["A for Apple", "B for Ball", "C for Cat", "D for Dog", "E for Elephant"],
 questions: ["What is your name?", "Where do you live?", "How are you?", "What do you do?", "Are you busy?"],
 grammar: ["She don't like apples", "I am go to market", "He have two car", "They is playing cricket", "We was late yesterday"],
 leave: ["I am sick today", "Please grant me leave", "I have fever", "I will come tomorrow", "Thank you sir"]
 };
 </script>
 </body>
 </html>
